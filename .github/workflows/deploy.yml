name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: whataisle-prod
  REGION: us-central1
  SERVICE_NAME: whataisle
  MIGRATE_JOB_NAME: whataisle-migrate
  IMAGE: us-central1-docker.pkg.dev/whataisle-prod/whataisle/app
  MIGRATE_IMAGE: us-central1-docker.pkg.dev/whataisle-prod/whataisle/migrate
  BASE_URL: https://www.whataisle.com
  ROOT_DOMAIN: whataisle.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ env.BASE_URL }}
            NEXT_PUBLIC_ROOT_DOMAIN=${{ env.ROOT_DOMAIN }}
            NEXT_PUBLIC_STRIPE_PRICE_LIFETIME=${{ vars.NEXT_PUBLIC_STRIPE_PRICE_LIFETIME }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache,mode=max

      - name: Build and push migrate image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.migrate
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.MIGRATE_IMAGE }}:${{ github.sha }}
            ${{ env.MIGRATE_IMAGE }}:latest

      - name: Run migrations
        run: |
          gcloud run jobs update ${{ env.MIGRATE_JOB_NAME }} \
            --region=${{ env.REGION }} \
            --image=${{ env.MIGRATE_IMAGE }}:${{ github.sha }}
          gcloud run jobs execute ${{ env.MIGRATE_JOB_NAME }} \
            --region=${{ env.REGION }} --wait

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --image=${{ env.IMAGE }}:${{ github.sha }}
