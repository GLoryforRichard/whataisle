name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  NEXT_PUBLIC_BASE_URL: http://localhost:3000
  NEXT_PUBLIC_ROOT_DOMAIN: localhost
  NEXT_PUBLIC_PAYMENT_PROVIDER: stripe
  DATABASE_URL: postgresql://whataisle:whataisle@localhost:5432/whataisle
  BETTER_AUTH_SECRET: ci-better-auth-secret-at-least-32-characters
  GOOGLE_CLIENT_ID: ci-google-client-id
  GOOGLE_CLIENT_SECRET: ci-google-client-secret
  STAFF_COOKIE_SECRET: ci-staff-cookie-secret-at-least-32-characters
  MAIL_PROVIDER: smtp
  AI_STUB: 'true'
  STORAGE_PROVIDER: local

jobs:
  quality:
    name: Check, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Check formatting and lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
